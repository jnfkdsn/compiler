name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e .[dev]

      - name: Black check
        run: black --check .

      - name: isort check
        run: isort --check-only .

      - name: Ruff lint
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e .[dev]

      - name: Run tests with coverage
        run: pytest --cov=tensor_cpu --cov-report=term-missing --tb=short

      - name: Benchmark smoke
        run: python examples/benchmarks/run_bench.py --quick --threads 1 --output benchmark-smoke.json

      - name: Benchmark regression check
        run: >
          python examples/benchmarks/run_bench.py
          --quick --threads 1
          --compare examples/benchmarks/baseline.quick.json
          --threshold 0.10
